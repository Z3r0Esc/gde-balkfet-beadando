name: CI-Docker-Build-WebUI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "source/WebUI/**"
      - ".github/workflows/ci-docker-build-ui.yml"
  pull_request:
    paths:
      - "source/WebUI/**"
      - ".github/workflows/ci-docker-build-ui.yml"

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Normalize image repository name
        run: echo "IMAGE_REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./source
          file: ./source/WebUI/Dockerfile
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/webui:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/webui:${{ github.sha }}
